name: vezeeta

services:
  postgres:
    image: postgres:17-alpine
    container_name: vezeeta-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-vezeta}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change-me-in-production}
      POSTGRES_DB: ${POSTGRES_DB:-vezeta_auth}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-vezeta} -d ${POSTGRES_DB:-vezeta_auth}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - vezeeta-net

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: vezeeta-app
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DATABASE_URL: postgresql://${POSTGRES_USER:-vezeta}:${POSTGRES_PASSWORD:-change-me-in-production}@postgres:5432/${POSTGRES_DB:-vezeta_auth}?schema=public
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      CORS_ORIGIN: ${CORS_ORIGIN:-}
      SWAGGER_ENABLED: ${SWAGGER_ENABLED:-false}
      RUN_SEED: ${RUN_SEED:-false}
      SEED_ADMIN_EMAIL: ${SEED_ADMIN_EMAIL:-admin@vezeta.local}
      SEED_ADMIN_PHONE: ${SEED_ADMIN_PHONE:-+201000000000}
      SEED_ADMIN_PASSWORD: ${SEED_ADMIN_PASSWORD:-ChangeMe123!}
      SEED_ADMIN_NAME: ${SEED_ADMIN_NAME:-Super Admin}
    ports:
      - "${PORT:-3000}:3000"
    networks:
      - vezeeta-net

volumes:
  postgres-data:

networks:
  vezeeta-net:
    driver: bridge
